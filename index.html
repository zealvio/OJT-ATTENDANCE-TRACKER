<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>OJT Attendance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>OJT Attendance Log</h2>

<div class="table-container"> 
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Duty Day</th>
                <th>Time In</th>
                <th>Break Start</th>
                <th>Break End</th>
                <th>Time Out</th>
                <th>Total Hours</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<div class="grand-total-section">
    <h3>Grand Total OJT Hours</h3>
    <p id="total-summary">0 Hours 0 Minutes</p>
</div>

    <script src="script.js"></script>
</body>
</html>
